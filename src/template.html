<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taskify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <form id="modal" class="hidden">
      <div class="input-dialog">
        <h2>Add Task</h2>
        <div>
          <label for="title">Title:</label>
          <input
            class="add-task-input"
            type="text"
            name="title"
            id="title"
            placeholder="Research articles on food blog"
            value="Research articles on food blog"
            required
          />
        </div>
        <div>
          <label for="description">Description:</label>
          <textarea
            name="description"
            id="description"
            placeholder="To read the lorem lore"
            required
          >
Lorem ipsum dolor sit amet consectetur, adipisicing elit.</textarea
          >
        </div>
        <div>
          <label for="due-date">Due Date:</label>
          <input
            type="datetime-local"
            id="due-date"
            name="due-date"
            value="2025-06-01T08:30"
            required
          />
        </div>
        <div>
          <label for="priority">Priority:</label>
          <select name="priority" id="priority">
            <option value="High">High</option>
            <option value="Mid">Mid</option>
            <option value="Low" selected>Low</option>
          </select>
        </div>
        <div class="task-input-btns">
          <button class="submit-btn" type="submit">Add</button>
          <button class="cancel-btn" type="button">Cancel</button>
        </div>
      </div>
    </form>

    <form id="add-project-modal" class="hidden">
      <div class="add-project-dialog">
        <h2>Add Project</h2>
        <div>
          <label for="proj-title">Title:</label>
          <input
            class="add-project-input"
            type="text"
            id="proj-title"
            name="proj-title"
            placeholder="Project Name"
            value="New Project"
            required
          />
        </div>
        <button type="submit" class="add-project-btn">Confirm</button>
      </div>
    </form>

    <div class="sidebar">
      <h1 class="header">Taskify</h1>

      <div class="sidebar-content">
        <div class="add-task-btn add-task">
          <svg
            class="add-task-img"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
          >
            <title>Add New Task</title>
            <path
              d="M17,13H13V17H11V13H7V11H11V7H13V11H17M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2Z"
            />
          </svg>
          <h2 class="add-task-text">Add Task</h2>
        </div>

        <div class="by-date">
          <div class="by-date-type">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <title>All Tasks</title>
              <path
                d="M7,5H21V7H7V5M7,13V11H21V13H7M4,4.5A1.5,1.5 0 0,1 5.5,6A1.5,1.5 0 0,1 4,7.5A1.5,1.5 0 0,1 2.5,6A1.5,1.5 0 0,1 4,4.5M4,10.5A1.5,1.5 0 0,1 5.5,12A1.5,1.5 0 0,1 4,13.5A1.5,1.5 0 0,1 2.5,12A1.5,1.5 0 0,1 4,10.5M7,19V17H21V19H7M4,16.5A1.5,1.5 0 0,1 5.5,18A1.5,1.5 0 0,1 4,19.5A1.5,1.5 0 0,1 2.5,18A1.5,1.5 0 0,1 4,16.5Z"
              />
            </svg>
            <div>All</div>
          </div>
          <div class="by-date-type">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <title>Tasks for Today</title>
              <path
                d="M7,10H12V15H7M19,19H5V8H19M19,3H18V1H16V3H8V1H6V3H5C3.89,3 3,3.9 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V5A2,2 0 0,0 19,3Z"
              />
            </svg>
            <div>Today</div>
          </div>
          <div class="by-date-type">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <title>Upcoming Tasks</title>
              <path
                d="M15,13H16.5V15.82L18.94,17.23L18.19,18.53L15,16.69V13M19,8H5V19H9.67C9.24,18.09 9,17.07 9,16A7,7 0 0,1 16,9C17.07,9 18.09,9.24 19,9.67V8M5,21C3.89,21 3,20.1 3,19V5C3,3.89 3.89,3 5,3H6V1H8V3H16V1H18V3H19A2,2 0 0,1 21,5V11.1C22.24,12.36 23,14.09 23,16A7,7 0 0,1 16,23C14.09,23 12.36,22.24 11.1,21H5M16,11.15A4.85,4.85 0 0,0 11.15,16C11.15,18.68 13.32,20.85 16,20.85A4.85,4.85 0 0,0 20.85,16C20.85,13.32 18.68,11.15 16,11.15Z"
              />
            </svg>
            <div>Upcoming</div>
          </div>
          <div class="by-date-type">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <title>Past Due Date</title>
              <path
                d="M7,10H12V15H7M19,19H5V8H19M19,3H18V1H16V3H8V1H6V3H5C3.89,3 3,3.9 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V5A2,2 0 0,0 19,3Z"
              />
            </svg>
            <div>Past</div>
          </div>
        </div>

        <div class="projects-header add-project">
          <h2 class="projects-header-text">Projects</h2>
          <svg
            class="add-project-img"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
          >
            <title>Add New Project</title>
            <path
              d="M17,13H13V17H11V13H7V11H11V7H13V11H17M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2Z"
            />
          </svg>
        </div>
        <div class="projects">
          <div class="project">
            <div class="project-title">Project 1</div>
            <svg
              class="project-delete-btn"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
            >
              <title>Delete Project</title>
              <path
                d="M18,19C18,20.66 16.66,22 15,22H8C6.34,22 5,20.66 5,19V7H4V4H8.5L9.5,3H13.5L14.5,4H19V7H18V19M6,7V19C6,20.1 6.9,21 8,21H15C16.1,21 17,20.1 17,19V7H6M18,6V5H14L13,4H10L9,5H5V6H18M8,9H9V19H8V9M14,9H15V19H14V9Z"
              />
            </svg>
          </div>
        </div>
      </div>
    </div>

    <div class="main">
      <div class="main-header">
        <h1 class="type">All</h1>
        <div class="main-header-btns">
          <div>
            <div class="add-task-btn2 add-task">
              <svg
                class="add-task-img2"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
              >
                <title>Add New Task</title>
                <path
                  d="M17,13H13V17H11V13H7V11H11V7H13V11H17M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2Z"
                />
              </svg>
              <h2 class="add-task-text2">Add Task</h2>
            </div>
          </div>
          <div>
            <div class="add-task-btn2 add-project">
              <svg
                class="add-task-img2"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
              >
                <title>Add New Task</title>
                <path
                  d="M17,13H13V17H11V13H7V11H11V7H13V11H17M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2Z"
                />
              </svg>
              <h2 class="add-task-text2">Add Project</h2>
            </div>
          </div>
        </div>
      </div>

      <div class="main-content"></div>
    </div>
  </body>
</html>
